<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css -->
     <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body style="height: 100vh; display: flex; justify-content: center; align-items: center;">
    <div style=" display: flex; flex-direction: column; height: 500px; width: 400px; background-color: cyan; border-radius: 10px; box-shadow: 0 0 10px rgb(140, 255, 58);">

        <img src="./logo-tic-tac-ultimate-tic-tac-toe-font-game-logo-94ad25268fb96fa76c51df1eaf6e7e8d.png" alt="">
        <div id="cells-section" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px;">
            <button class="keys"></button>
            <button class="keys"></button>
            <button class="keys"></button>
            <button class="keys"></button>
            <button class="keys"></button>
            <button class="keys"></button>
            <button class="keys"></button>
            <button class="keys"></button>
            <button class="keys"></button>
        </div>
        <div style="display: flex; justify-content: center; margin-top: 20px;">
            <button id="rstBtn" style="width: 100px; background-color: greenyellow; color: rgb(49, 22, 2); font-weight: 800; border: none; border-radius: 10px; padding: 10px; box-shadow: 0 0 10px gray;">Reset</button>
        </div>   
        <div style="display: flex; justify-content: center;">
             <div style="display: flex; gap: 10px;">
            <h3 >Total Counts : </h3>
            <h3 id="counts"></h3>
        </div>
        </div>
       

    </div>
</body>
<script>
   let keys = document.querySelectorAll(".keys");
   let counts = document.querySelector("#counts");
   let rstBtn = document.querySelector("#rstBtn");
   let count = 0;
   counts.innerText = count;
  
   let isXon = true;


const winPatterns = [
  [0,1,2],
  [3,4,5],
  [6,7,8],
  [0,3,6],
  [1,4,7],
  [2,5,8],
  [0,4,8],
  [2,4,6]
];

const checkWinner = () => {
  let values = Array.from(keys).map(btn => btn.innerText);

  for (let pattern of winPatterns) {
    let [a, b, c] = pattern;

    if (
      values[a] &&
      values[a] === values[b] &&
      values[a] === values[c]
    ) {
      alert(values[a] + " wins!");
    }
  }
};

   keys.forEach((eachKey)=>{
        eachKey.addEventListener("click",(event)=>{
           count +=1;
            counts.innerText = count;
           event.target.disabled = true;
            if(isXon === true){
                eachKey.style.color = "orange"
                eachKey.innerText = "X";
               
            } else {
                eachKey.style.color = "blue"
                eachKey.innerText = "O";
                
            }

          

            isXon = !isXon;
              checkWinner();

        })
   }
)

rstBtn.addEventListener("click",()=>{
   count =0;
   counts.innerText = count;
   isXon = true;

   keys.forEach((eachKey)=> {
    eachKey.disabled = false;
    eachKey.innerText = "";
    eachKey.style.color = "";
   })
})


</script>
</html>
